name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov reportlab

      - name: Run tests
        env:
          # Dummy values so config.py imports without raising on missing keys.
          PROVIDER: deepseek
          DEEPSEEK_API_KEY: sk-ci-dummy
          GEMINI_API_KEY: gm-ci-dummy
        run: pytest tests/ -v --tb=short